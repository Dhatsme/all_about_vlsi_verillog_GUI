<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#080b10"/>
  <!-- chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="#00d4aa"/>
  <!-- pin lines — left -->
  <line x1="9" y1="13" x2="5" y2="13" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="16" x2="5" y2="16" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="19" x2="5" y2="19" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- pin lines — right -->
  <line x1="23" y1="13" x2="27" y2="13" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="27" y2="16" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="19" x2="27" y2="19" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- pin lines — top -->
  <line x1="13" y1="9" x2="13" y2="5" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="9" x2="16" y2="5" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="9" x2="19" y2="5" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- pin lines — bottom -->
  <line x1="13" y1="23" x2="13" y2="27" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="27" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="23" x2="19" y2="27" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- inner die -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="#080b10"/>
  <rect x="14" y="14" width="4" height="4" rx="0.5" fill="#00d4aa" opacity="0.6"/>
</svg>
